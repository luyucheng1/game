<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 雪糕牌贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        #game-container {
            position: relative;
            border: 4px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
        }
        #gameCanvas {
            display: block;
            background: #0f0f23;
            border-radius: 6px;
        }
        #ui {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            font-size: 1.2em;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        #startBtn {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #4a9eff 0%, #00d4ff 100%);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(74, 158, 255, 0.4);
        }
        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.6);
        }
        #startBtn:active {
            transform: translateY(0);
        }
        #instructions {
            margin-top: 20px;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9em;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 3px solid #ff4757;
        }
        #gameOver h2 {
            color: #ff4757;
            margin-bottom: 15px;
        }
        #finalScore {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .controls button {
            width: 50px;
            height: 50px;
            font-size: 1.5em;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <h1>🐍 雪糕牌贪吃蛇 🍦</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver">
            <h2>💀 游戏结束!</h2>
            <div id="finalScore">得分：0</div>
            <button id="restartBtn" onclick="startGame()">再玩一次</button>
        </div>
    </div>
    <div id="ui">
        <div class="stat">🏆 得分：<span id="score">0</span></div>
        <div class="stat">🥇 最高：<span id="highScore">0</span></div>
    </div>
    <button id="startBtn" onclick="startGame()">开始游戏</button>
    <div class="controls">
        <button onclick="setDirection('up')">⬆️</button>
    </div>
    <div class="controls">
        <button onclick="setDirection('left')">⬅️</button>
        <button onclick="setDirection('down')">⬇️</button>
        <button onclick="setDirection('right')">➡️</button>
    </div>
    <div id="instructions">
        <p>🎮 用方向键或屏幕按钮控制蛇的移动</p>
        <p>🍎 吃到食物得分，撞墙或咬到自己就结束</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let gameSpeed = 150;
        let isGameRunning = false;

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            document.getElementById('score').textContent = score;
            spawnFood();
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 画食物
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff4757';

            // 画蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#4a9eff');
                    gradient.addColorStop(1, '#00d4ff');
                } else {
                    gradient.addColorStop(0, '#00d4ff');
                    gradient.addColorStop(1, '#4a9eff');
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
            });

            ctx.shadowBlur = 0;
        }

        function update() {
            direction = { ...nextDirection };
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                // 加速
                if (gameSpeed > 80) {
                    gameSpeed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            initGame();
            gameSpeed = 150;
            isGameRunning = true;
            draw();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = `得分：${score}`;
            document.getElementById('gameOver').style.display = 'block';
        }

        function setDirection(dir) {
            if (!isGameRunning) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    setDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    setDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    setDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    setDirection('right');
                    e.preventDefault();
                    break;
            }
        });

        // 初始画面
        initGame();
        draw();
    </script>
</body>
</html>
