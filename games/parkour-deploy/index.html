<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏃 雪糕牌跑酷 - 闯关模式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2em;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        #game-container {
            position: relative;
            border: 4px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.5);
            overflow: hidden;
            max-width: 95vw;
            max-height: 60vh;
        }
        #gameCanvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        #ui {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 1.1em;
            color: #fff;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #startBtn, #levelSelectBtn {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border: none;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        #startBtn:hover, #levelSelectBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }
        #gameOver, #levelComplete, #levelSelect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 3px solid #4a9eff;
            color: #fff;
            min-width: 400px;
            z-index: 100;
        }
        #gameOver h2 { color: #FF6B6B; margin-bottom: 15px; }
        #levelComplete h2 { color: #2ecc71; margin-bottom: 15px; }
        #levelSelect h2 { color: #4a9eff; margin-bottom: 20px; }
        #finalScore, #levelScore { font-size: 1.4em; margin-bottom: 15px; }
        .level-btn {
            display: inline-block;
            margin: 8px;
            padding: 15px 25px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #4a9eff 0%, #00d4ff 100%);
            border: none;
            border-radius: 15px;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .level-btn:hover { transform: scale(1.05); }
        .level-btn.locked {
            background: linear-gradient(135deg, #555 0%, #777 100%);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .level-btn.completed {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
        }
        #instructions {
            margin-top: 15px;
            text-align: center;
            color: #aaa;
            font-size: 0.9em;
            max-width: 600px;
            padding: 0 10px;
        }
        
        /* 移动端自适应 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
                padding: 0 10px;
            }
            #game-container {
                border-width: 2px;
                max-width: 98vw;
                max-height: 55vh;
            }
            #gameCanvas {
                width: 100%;
                height: auto;
            }
            #ui {
                gap: 10px;
                font-size: 0.9em;
            }
            .stat {
                padding: 5px 10px;
                font-size: 0.85em;
            }
            #startBtn, #levelSelectBtn {
                padding: 10px 25px;
                font-size: 1em;
            }
            #gameOver, #levelComplete, #levelSelect {
                min-width: 90vw;
                padding: 20px;
                max-width: 95vw;
            }
            #gameOver h2, #levelComplete h2, #levelSelect h2 {
                font-size: 1.3em;
            }
            .level-btn {
                padding: 12px 18px;
                font-size: 0.95em;
                margin: 5px;
            }
            #instructions {
                font-size: 0.8em;
            }
            #pauseBtn {
                padding: 6px 12px;
                font-size: 0.9em;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.2em;
            }
            #game-container {
                max-height: 50vh;
            }
            #ui {
                flex-wrap: wrap;
                font-size: 0.8em;
            }
            .stat {
                padding: 4px 8px;
            }
        }
        #powerupIndicator {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .powerup-active {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9em;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        #pauseBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 15px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🏃 雪糕牌跑酷 - 闯关模式 🍦</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <button id="pauseBtn" onclick="togglePause()">⏸️ 暂停</button>
        <div id="powerupIndicator"></div>
        
        <div id="gameOver">
            <h2>💥 闯关失败!</h2>
            <div id="finalScore">得分：0</div>
            <div id="coinsCollected">金币：0</div>
            <button onclick="restartLevel()" style="margin-top: 15px; padding: 10px 25px; font-size: 1em; background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%); border: none; border-radius: 20px; color: #fff; cursor: pointer;">🔄 重试本关</button>
            <button onclick="showLevelSelect()" style="margin-top: 10px; padding: 10px 25px; font-size: 1em; background: linear-gradient(135deg, #4a9eff 0%, #00d4ff 100%); border: none; border-radius: 20px; color: #fff; cursor: pointer;">📋 选择关卡</button>
        </div>
        
        <div id="levelComplete">
            <h2>🎉 闯关成功!</h2>
            <div id="levelScore">得分：0</div>
            <div id="coinsInLevel">金币：0</div>
            <div id="starsEarned">⭐⭐⭐</div>
            <button onclick="nextLevel()" style="margin-top: 15px; padding: 10px 25px; font-size: 1em; background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); border: none; border-radius: 20px; color: #fff; cursor: pointer;">➡️ 下一关</button>
            <button onclick="showLevelSelect()" style="margin-top: 10px; padding: 10px 25px; font-size: 1em; background: linear-gradient(135deg, #4a9eff 0%, #00d4ff 100%); border: none; border-radius: 20px; color: #fff; cursor: pointer;">📋 选择关卡</button>
        </div>
        
        <div id="levelSelect">
            <h2>🗺️ 选择关卡</h2>
            <div id="levelButtons"></div>
            <button onclick="closeLevelSelect()" style="margin-top: 20px; padding: 10px 25px; font-size: 1em; background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%); border: none; border-radius: 20px; color: #fff; cursor: pointer;">❌ 关闭</button>
        </div>
    </div>
    
    <div id="ui">
        <div class="stat">🏆 得分：<span id="score">0</span></div>
        <div class="stat">🌟 关卡：<span id="level">1</span></div>
        <div class="stat">💰 金币：<span id="coins">0</span></div>
        <div class="stat">🎯 目标：<span id="goal">0</span></div>
        <div class="stat">❤️ 生命：<span id="lives">1</span></div>
    </div>
    
    <button id="startBtn" onclick="showLevelSelect()">🎮 开始游戏</button>
    
    <div id="instructions">
        <p>🎮 <strong>空格键</strong> / <strong>点击屏幕</strong> / <strong>触摸屏幕</strong> 跳跃 | <strong>P 键</strong> 暂停</p>
        <p>🪙 收集金币 | ⚡ 吃道具获得特殊能力 | 🎯 达到目标分数进入下一关</p>
        <p style="margin-top: 5px; color: #666; font-size: 0.85em;">📱 移动端已优化 - 点击任意位置即可跳跃</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 关卡配置
        const levels = [
            {
                name: "🌱 新手村",
                goal: 100,
                speed: 5,
                obstacleFreq: 100,
                coinFreq: 60,
                powerupChance: 0.02,
                colors: { sky: ['#87CEEB', '#E0F6FF'], ground: '#8B4513', grass: '#27ae60' },
                lives: 1
            },
            {
                name: "🏜️ 沙漠之旅",
                goal: 200,
                speed: 6,
                obstacleFreq: 90,
                coinFreq: 50,
                powerupChance: 0.03,
                colors: { sky: ['#FFA500', '#FFD700'], ground: '#D2691E', grass: '#DAA520' },
                lives: 1
            },
            {
                name: "🌲 森林冒险",
                goal: 300,
                speed: 7,
                obstacleFreq: 80,
                coinFreq: 45,
                powerupChance: 0.04,
                colors: { sky: ['#228B22', '#90EE90'], ground: '#654321', grass: '#006400' },
                lives: 2
            },
            {
                name: "🏔️ 雪山挑战",
                goal: 400,
                speed: 8,
                obstacleFreq: 70,
                coinFreq: 40,
                powerupChance: 0.05,
                colors: { sky: ['#B0E0E6', '#FFFFFF'], ground: '#708090', grass: '#F0F8FF' },
                lives: 2
            },
            {
                name: "🌋 火山危机",
                goal: 500,
                speed: 9,
                obstacleFreq: 60,
                coinFreq: 35,
                powerupChance: 0.06,
                colors: { sky: ['#FF4500', '#FF6347'], ground: '#2F2F2F', grass: '#8B0000' },
                lives: 3
            },
            {
                name: "🌌 终极考验",
                goal: 700,
                speed: 11,
                obstacleFreq: 50,
                coinFreq: 30,
                powerupChance: 0.07,
                colors: { sky: ['#1a1a2e', '#16213e'], ground: '#4a0080', grass: '#9400D3' },
                lives: 3
            }
        ];

        // 道具类型
        const powerups = [
            { name: "⚡ 加速", type: "speed", duration: 5000, color: '#FFD700', icon: '⚡' },
            { name: "🛡️ 无敌", type: "invincible", duration: 4000, color: '#00FFFF', icon: '🛡️' },
            { name: "💰 双倍金币", type: "doubleCoins", duration: 6000, color: '#FFA500', icon: '💰' },
            { name: "🦘 超级跳", type: "superJump", duration: 5000, color: '#FF69B4', icon: '🦘' },
            { name: "❤️ 额外生命", type: "extraLife", duration: 0, color: '#FF0000', icon: '❤️' }
        ];

        // 游戏状态
        let gameRunning = false;
        let paused = false;
        let currentLevel = 0;
        let score = 0;
        let coins = 0;
        let frameCount = 0;
        let lives = 1;
        let activePowerups = [];
        let gameSpeed = 5;

        // 玩家
        const player = {
            x: 100,
            y: 0,
            width: 40,
            height: 60,
            velocityY: 0,
            jumpPower: -15,
            gravity: 0.8,
            grounded: false,
            color: '#FF6B6B',
            invincible: false,
            superJump: false
        };

        let obstacles = [];
        let coinsArray = [];
        let powerupsArray = [];
        let particles = [];

        const ground = { y: canvas.height - 50, height: 50 };

        // 存档系统
        function loadProgress() {
            const saved = localStorage.getItem('parkourProgress');
            return saved ? JSON.parse(saved) : { unlockedLevels: 1, bestScores: {} };
        }

        function saveProgress() {
            const progress = {
                unlockedLevels: Math.max(currentLevel + 1, loadProgress().unlockedLevels),
                bestScores: loadProgress().bestScores
            };
            localStorage.setItem('parkourProgress', JSON.stringify(progress));
        }

        function initLevel(levelIndex) {
            currentLevel = levelIndex;
            const level = levels[levelIndex];
            score = 0;
            coins = 0;
            lives = level.lives;
            gameSpeed = level.speed;
            activePowerups = [];
            obstacles = [];
            coinsArray = [];
            powerupsArray = [];
            particles = [];
            player.y = 0;
            player.velocityY = 0;
            player.invincible = false;
            player.superJump = false;
            
            updateUI();
        }

        function updateUI() {
            const level = levels[currentLevel];
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = currentLevel + 1;
            document.getElementById('coins').textContent = coins;
            document.getElementById('goal').textContent = level.goal;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function spawnObstacle() {
            const level = levels[currentLevel];
            const type = Math.random();
            let obstacle;
            
            if (type < 0.5) {
                obstacle = { x: canvas.width, y: ground.y - 40, width: 30, height: 40, type: 'cactus', color: level.colors.grass };
            } else if (type < 0.7) {
                obstacle = { x: canvas.width, y: ground.y - 60, width: 25, height: 60, type: 'tallCactus', color: level.colors.grass };
            } else if (type < 0.85) {
                obstacle = { x: canvas.width, y: ground.y - 30, width: 40, height: 30, type: 'rock', color: '#808080' };
            } else {
                obstacle = { x: canvas.width, y: ground.y, width: 80, height: 50, type: 'pit', color: '#654321' };
            }
            obstacles.push(obstacle);
        }

        function spawnCoin() {
            const y = ground.y - 30 - Math.random() * 100;
            coinsArray.push({
                x: canvas.width,
                y: y,
                width: 20,
                height: 20,
                collected: false
            });
        }

        function spawnPowerup() {
            const level = levels[currentLevel];
            const powerup = powerups[Math.floor(Math.random() * powerups.length)];
            powerupsArray.push({
                x: canvas.width,
                y: ground.y - 50 - Math.random() * 80,
                width: 30,
                height: 30,
                ...powerup
            });
        }

        function activatePowerup(p) {
            if (p.type === 'extraLife') {
                lives++;
                createParticles(p.x, p.y, p.color, 10);
            } else {
                activePowerups.push({
                    ...p,
                    endTime: Date.now() + p.duration
                });
                if (p.type === 'invincible') player.invincible = true;
                if (p.type === 'superJump') player.superJump = true;
                createParticles(p.x, p.y, p.color, 15);
            }
            updateUI();
        }

        function updatePowerups() {
            const now = Date.now();
            activePowerups = activePowerups.filter(p => {
                if (now >= p.endTime) {
                    if (p.type === 'invincible') player.invincible = false;
                    if (p.type === 'superJump') player.superJump = false;
                    return false;
                }
                return true;
            });
            
            const indicator = document.getElementById('powerupIndicator');
            indicator.innerHTML = activePowerups.map(p => 
                `<div class="powerup-active">${p.icon} ${Math.ceil((p.endTime - now) / 1000)}s</div>`
            ).join('');
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color
                });
            }
        }

        function jump() {
            if (!gameRunning || paused) return;
            if (player.grounded) {
                player.velocityY = player.superJump ? player.jumpPower * 1.5 : player.jumpPower;
                player.grounded = false;
            }
        }

        function update() {
            if (paused) return;
            
            frameCount++;
            const level = levels[currentLevel];
            
            // 更新道具时间
            updatePowerups();
            
            // 玩家物理
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y + player.height >= ground.y) {
                player.y = ground.y - player.height;
                player.velocityY = 0;
                player.grounded = true;
            }

            // 更新障碍物
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;
                if (obs.x + obs.width < 0) obstacles.splice(index, 1);

                if (!player.invincible &&
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    if (obs.type !== 'pit') {
                        lives--;
                        updateUI();
                        createParticles(player.x, player.y, '#FF0000', 20);
                        if (lives <= 0) {
                            gameOver();
                        } else {
                            player.invincible = true;
                            setTimeout(() => player.invincible = false, 2000);
                        }
                    }
                }
            });

            // 收集金币
            coinsArray.forEach((coin, index) => {
                coin.x -= gameSpeed;
                if (coin.x + coin.width < 0) coinsArray.splice(index, 1);
                
                if (!coin.collected &&
                    player.x < coin.x + coin.width &&
                    player.x + player.width > coin.x &&
                    player.y < coin.y + coin.height &&
                    player.y + player.height > coin.y) {
                    coin.collected = true;
                    const coinValue = activePowerups.some(p => p.type === 'doubleCoins') ? 2 : 1;
                    coins += coinValue;
                    score += coinValue * 5;
                    createParticles(coin.x, coin.y, '#FFD700', 5);
                    updateUI();
                }
            });

            // 收集道具
            powerupsArray.forEach((p, index) => {
                p.x -= gameSpeed;
                if (p.x + p.width < 0) powerupsArray.splice(index, 1);
                
                if (player.x < p.x + p.width &&
                    player.x + player.width > p.x &&
                    player.y < p.y + p.height &&
                    player.y + player.height > p.y) {
                    activatePowerup(p);
                    powerupsArray.splice(index, 1);
                }
            });

            // 更新粒子
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                p.life--;
                if (p.life <= 0) particles.splice(index, 1);
            });

            // 生成障碍物和金币
            if (frameCount % Math.floor(level.obstacleFreq - gameSpeed * 2) === 0) {
                spawnObstacle();
            }
            if (frameCount % Math.floor(level.coinFreq) === 0) {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => spawnCoin(), i * 100);
                }
            }
            if (Math.random() < level.powerupChance) {
                spawnPowerup();
            }

            // 检查过关
            if (score >= level.goal) {
                levelComplete();
            }

            score += 0.1;
            updateUI();
        }

        function draw() {
            const level = levels[currentLevel];
            
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, level.colors.sky[0]);
            gradient.addColorStop(1, level.colors.sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = level.colors.ground;
            ctx.fillRect(0, ground.y, canvas.width, ground.height);
            ctx.fillStyle = level.colors.grass;
            ctx.fillRect(0, ground.y, canvas.width, 10);

            // 画障碍物
            obstacles.forEach(obs => {
                if (obs.type === 'pit') {
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                } else if (obs.type === 'rock') {
                    ctx.fillStyle = obs.color;
                    ctx.beginPath();
                    ctx.arc(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = obs.color;
                    ctx.fillRect(obs.x + obs.width/2 - 5, obs.y, 10, obs.height);
                }
            });

            // 画金币
            coinsArray.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2, 10, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#FFA500';
                    ctx.font = 'bold 14px Arial';
                    ctx.fillText('$', coin.x + 6, coin.y + 15);
                }
            });

            // 画道具
            powerupsArray.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x + p.width/2, p.y + p.height/2, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(p.icon, p.x + 6, p.y + 21);
            });

            // 画玩家
            ctx.fillStyle = player.invincible ? '#FFF' : player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#FFE4C4';
            ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y - 10, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(player.x + player.width/2 + 5, player.y - 12, 3, 0, Math.PI * 2);
            ctx.fill();

            // 画粒子
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 5, 5);
            });
            ctx.globalAlpha = 1;

            // 进度条
            const progress = Math.min(score / level.goal, 1);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, 10, 200, 20);
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(10, 10, 200 * progress, 20);
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText(`${Math.floor(progress * 100)}%`, 15, 24);
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame(levelIndex) {
            initLevel(levelIndex);
            gameRunning = true;
            paused = false;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            document.getElementById('levelSelect').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = `得分：${Math.floor(score)}`;
            document.getElementById('coinsCollected').textContent = `金币：${coins}`;
            document.getElementById('gameOver').style.display = 'block';
        }

        function levelComplete() {
            gameRunning = false;
            const stars = score >= levels[currentLevel].goal * 1.5 ? 3 : score >= levels[currentLevel].goal * 1.2 ? 2 : 1;
            document.getElementById('levelScore').textContent = `得分：${Math.floor(score)}`;
            document.getElementById('coinsInLevel').textContent = `金币：${coins}`;
            document.getElementById('starsEarned').textContent = '⭐'.repeat(stars);
            
            // 解锁下一关
            const progress = loadProgress();
            if (currentLevel + 1 >= progress.unlockedLevels && currentLevel < levels.length - 1) {
                progress.unlockedLevels = currentLevel + 2;
                localStorage.setItem('parkourProgress', JSON.stringify(progress));
            }
            
            document.getElementById('levelComplete').style.display = 'block';
        }

        function restartLevel() {
            startGame(currentLevel);
        }

        function nextLevel() {
            if (currentLevel < levels.length - 1) {
                startGame(currentLevel + 1);
            } else {
                alert('🎉 恭喜通关所有关卡！你太厉害了！');
                showLevelSelect();
            }
        }

        function showLevelSelect() {
            gameRunning = false;
            const progress = loadProgress();
            const container = document.getElementById('levelButtons');
            container.innerHTML = levels.map((level, index) => {
                const unlocked = index < progress.unlockedLevels;
                const completed = index < progress.unlockedLevels - 1;
                return `<button class="level-btn ${unlocked ? '' : 'locked'} ${completed ? 'completed' : ''}" 
                    data-level="${index}" id="levelBtn${index}">
                    ${index + 1}. ${level.name}
                    ${completed ? ' ✅' : ''}
                </button>`;
            }).join('');
            
            // 绑定点击事件
            levels.forEach((level, index) => {
                const btn = document.getElementById(`levelBtn${index}`);
                if (index < progress.unlockedLevels) {
                    btn.onclick = () => startGame(index);
                } else {
                    btn.onclick = null;
                }
            });
            
            document.getElementById('levelSelect').style.display = 'block';
        }

        function closeLevelSelect() {
            document.getElementById('levelSelect').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
        }

        function togglePause() {
            if (!gameRunning) return;
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
        }

        // 事件监听
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                jump();
            }
            if (e.key === 'p' || e.key === 'P') {
                togglePause();
            }
        });

        // 鼠标点击跳跃
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            jump();
        });
        
        // 触摸跳跃 - 支持移动端
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });
        
        // 也支持点击整个游戏容器跳跃（移动端更友好）
        document.getElementById('game-container').addEventListener('touchstart', (e) => {
            if (e.target === canvas || e.target.id === 'game-container') {
                e.preventDefault();
                jump();
            }
        }, { passive: false });
        
        // 防止双击缩放
        document.addEventListener('dblclick', (e) => e.preventDefault());

        // 初始画面
        draw();
    </script>
</body>
</html>
